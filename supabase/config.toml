# Hudsten — Supabase CLI config. Linked project ref lives in supabase/.temp (gitignored).
project_id = "gvaknqkaooqmtyvknyik"

[db]
# Matches the linked project's Postgres major version.
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[auth]
# Storefront + admin origins for local dev. Add production URLs in the dashboard.
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:5173"]
enable_signup = true

[storage]
enabled = true

[studio]
enabled = true
